<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع ندى الأول</title>
  <style>
    body {
    font-family: 'Tahoma', sans-serif;
  background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
    text-align: center;
    padding: 20px;
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
    .container {
  background: white;
    padding: 30px;
    border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    max-width: 400px;
    }
  img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 5px solid #ff6b9d;
  object-fit: cover;
    }
  h1 {
    color: #ff6b9d;
  margin: 20px 0 10px 0;
    }
  p {
    color: #666;
  line-height: 1.6;
  }
    button {
    background: #ff6b9d;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 25px;
  font-size: 16px;
    cursor: pointer;
  margin-top: 15px;
  }
    </style>
</head>
<body>
  <div class="container">
  <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=300" alt="صورة ندى">
    <h1>انا ندي وي عملت موقع 🚀</h1>
  <p>انا في 3 اعدادي وي ده اول كود في حياتي اعمله</p>
  <p><strong>بحلم ابقي مهندسه كمبيوتر</strong></p>
  <button onclick="alert('شكراً انك زورت موقعي! 💙')">دوسي عليا</button>
  </div>
</body>
</html>
