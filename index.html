<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ادعية من ندي لبابا</title>
    <style>
        body {font-family: 'Tahoma'; background: linear-gradient(135deg, #667eea, #764ba2); text-align: center; padding: 20px; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center;}
       .container {background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); max-width: 500px;}
        img {width: 120px; height: 120px; border-radius: 50%; border: 4px solid #667eea; object-fit: cover;}
        h1 {color: #667eea; margin: 15px 0; font-size: 24px;}
        #doaa {color: #333; line-height: 1.8; font-size: 18px; margin: 20px 0; min-height: 80px;}
        button {background: #667eea; color: white; border: none; padding: 12px 25px; border-radius: 25px; font-size: 16px; cursor: pointer; margin: 5px;}
       .footer {color: #888; font-size: 14px; margin-top: 20px;}
    </style>
</head>
<body>
    <div class="container">
        <img src="https://images.unsplash.com/photo-1573164713714-d95e436ab8d6?w=500">
        <h1>ادعية لبابا وصحابه 💙</h1>
        <p id="doaa">اللهم احفظ ابي وبارك في عمره وصحته وارزقه من حيث لا يحتسب</p>
        <button onclick="doaaGadid()">دعاء جديد 🤲</button>
        <button onclick="share()">ابعت لصحابك 📱</button>
        <p class="footer">من بنتك ندي - 3 اعدادي - مشروعي الاول</p>
    </div>

    <script>
        const ad3eya = [
            "اللهم احفظ ابي وبارك في عمره وصحته وارزقه من حيث لا يحتسب",
            "ربنا آتنا في الدنيا حسنة وفي الآخرة حسنة وقنا عذاب النار",
            "اللهم اشرح لي صدري ويسر لي أمري واحلل عقدة من لساني",
            "اللهم اني اسألك العفو والعافية في الدنيا والآخرة",
            "رب اجعلني مقيم الصلاة ومن ذريتي ربنا وتقبل دعاء",
            "اللهم بارك لنا في ارزاقنا واعمارنا واعمالنا",
            "اللهم يا مقلب القلوب ثبت قلبي على دينك"
        ];

        function doaaGadid() {
            const random = Math.floor(Math.random() * ad3eya.length);
            document.getElementById('doaa').innerText = ad3eya[random];
        }

        function share() {
            if (navigator.share) {
                navigator.share({
                    title: 'ادعية من ندي',
                    text: 'موقع ادعية جميل عملته ندي',
                    url: 'https://ndyb00295-maker.github.io'
                });
            } else {
                alert('انسخ اللينك وابعتو: https://ndyb00295-maker.github.io');
            }
        }
    </script>
</body>
</html>
